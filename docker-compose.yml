services:
  app:
    build: .
    environment:
      DATABASE_URL: postgres://counter:counter@postgres:5432/counter?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: counter
      POSTGRES_PASSWORD: counter
      POSTGRES_DB: counter
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counter -d counter"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
